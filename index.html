<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Mushroom</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    input, select, textarea { font-size: 1.2rem; padding: 6px; }
    input[type="number"] { width: 80px; }
    textarea { width: 100%; box-sizing: border-box; resize: vertical; }
    button { font-size: 1rem; padding: 8px 16px; margin-left: 8px; cursor: pointer; }


.tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.tab-btn { flex: 1; padding: 10px; font-size: 1rem; cursor: pointer; background: #eee; border: none; border-radius: 6px; }
.tab-btn.active { background: #333; color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

ul { list-style: none; padding: 0; margin-top: 0; }
li { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #ddd; }
.entry-text { flex: 1; }
.entry-notes { display: block; font-size: 0.9rem; color: #555; margin-top: 2px; }
.entry-location { display: block; font-size: 0.9rem; margin-top: 2px; }
.delete-btn { background: none; border: none; color: #999; font-size: 1rem; cursor: pointer; margin-left: 8px; padding: 0 4px; }
.delete-btn:hover { color: #c00; }

#debug-panel { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 16px; font-size: 0.85rem; color: #333; }

footer { margin-top: 32px; font-size: 0.75rem; color: #bbb; text-align: center; }


  </style>
</head>
<body>
  <h1><a href="?debug=1" style="text-decoration: none; color: inherit;">🍄</a> Find a Mushroom 🍄</h1>

  <div id="debug-panel" style="display:none">
    <strong>Debug</strong><br>
    <div id="location">Getting location…</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('log')">Log</button>
    <button class="tab-btn" onclick="showTab('history')">History</button>
  </div>

  <div id="tab-log" class="tab-panel active">
    <label for="mushroom">Type:</label>
    <select id="mushroom">
      <option value="Morel" selected>Morel</option>
      <option value="Oyster">Oyster</option>
    </select>
    <br><br>


<label for="count">Mushrooms found:</label>
<br><br>
<input type="number" id="count" min="1" value="1" inputmode="numeric" pattern="[0-9]*">
<button onclick="logFind()">I found some!</button>
<br><br>

<label for="notes">Notes (optional):</label>
<br>
<textarea id="notes" rows="2" placeholder="Where you found them, conditions, etc."></textarea>


  </div>

  <div id="tab-history" class="tab-panel">
    <ul id="log"></ul>
  </div>

  <footer>v0.1.5</footer>

  <script>
    let currentCoords = null;
    const debugMode = new URLSearchParams(window.location.search).get('debug') === '1';

    if (debugMode) {
      document.getElementById('debug-panel').style.display = 'block';
    }

    function initLocation() {
      if (!navigator.geolocation) {
        document.getElementById('location').textContent = 'Location not supported on this device.';
        return;
      }
      navigator.geolocation.watchPosition(
        pos => {
          currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          const lat = currentCoords.lat.toFixed(5);
          const lng = currentCoords.lng.toFixed(5);
          const url = `https://maps.apple.com/?ll=${lat},${lng}`;
          document.getElementById('location').innerHTML =
            `📍 <a href="${url}" target="_blank">${lat}, ${lng}</a>`;
        },
        err => {
          document.getElementById('location').textContent = 'Location unavailable (permission denied?).';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function showTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
    }

    function logFind() {
      const count = parseInt(document.getElementById('count').value);
      if (!count || count < 1) { alert('Enter a number greater than 0.'); return; }

      const mushroom = document.getElementById('mushroom').value;
      const notes = document.getElementById('notes').value.trim();
      const entry = { count, mushroom, timestamp: new Date().toISOString() };
      if (notes) entry.notes = notes;
      if (currentCoords) entry.coords = { lat: currentCoords.lat, lng: currentCoords.lng };

      const entries = getEntries();
      entries.unshift(entry);
      localStorage.setItem('morel_log', JSON.stringify(entries));

      document.getElementById('count').value = '1';
      document.getElementById('notes').value = '';
      document.getElementById('mushroom').value = 'Morel';
      renderLog();
    }

    function deleteEntry(index) {
      const entries = getEntries();
      const entry = entries[index];
      const label = `${entry.count} ${entry.mushroom || 'Morel'}${entry.count !== 1 ? 's' : ''}`;
      if (!confirm(`Delete this entry?\n\n${label}`)) return;
      entries.splice(index, 1);
      localStorage.setItem('morel_log', JSON.stringify(entries));
      renderLog();
    }

    function getEntries() {
      return JSON.parse(localStorage.getItem('morel_log') || '[]');
    }

    function renderLog() {
      const ul = document.getElementById('log');
      const entries = getEntries();
      if (entries.length === 0) {
        ul.innerHTML = '<li style="color:#888">No finds logged yet.</li>';
        return;
      }
      ul.innerHTML = entries.map((e, i) => {
        const mushroom = e.mushroom || 'Morel';
        const d = new Date(e.timestamp);
        const dateStr = d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
        const timeStr = d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
        const notesHtml = e.notes
          ? `<span class="entry-notes">${e.notes}</span>` : '';
        const locationHtml = e.coords
          ? `<span class="entry-location">📍 <a href="https://maps.apple.com/?ll=${e.coords.lat.toFixed(5)},${e.coords.lng.toFixed(5)}" target="_blank">${e.coords.lat.toFixed(5)}, ${e.coords.lng.toFixed(5)}</a></span>`
          : '';
        return `<li>
          <span class="entry-text">
            <strong>${e.count} ${mushroom}${e.count !== 1 ? 's' : ''}</strong> &mdash; ${dateStr} at ${timeStr}
            ${locationHtml}
            ${notesHtml}
          </span>
          <button class="delete-btn" onclick="deleteEntry(${i})" title="Delete entry">✕</button>
        </li>`;
      }).join('');
    }

    initLocation();
    renderLog();
  </script>

</body>
</html>
